version: "3.8"

services:
  marimo:
    build: .
    ports:
      - "2718:2718"
    volumes:
      - .:/app
    command: marimo run app.py --host 0.0.0.0 --port 2718

  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''